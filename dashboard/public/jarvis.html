function refreshMapViewport(forceGlobeReflow=false){
  const container = document.getElementById('mapContainer');
  if(!container) return;
  const width = container.clientWidth;
  const height = container.clientHeight || (isMobileLayout() ? 420 : 560);
  if(globe){
    globe.width(width).height(height);
    if(forceGlobeReflow && !isFlat){
      const globeEl = document.getElementById('globeViz');
      globeEl.style.display = 'none';
      requestAnimationFrame(() => {
        globeEl.style.display = 'block';
        globe.width(width).height(height);
      });
    }
  }
  if(flatSvg){
    flatW = width;
    flatH = height;
    flatSvg.attr('viewBox',`0 0 ${flatW} ${flatH}`).attr('preserveAspectRatio','xMidYMid meet');
    if(flatProjection && flatG){
      flatProjection = d3.geoNaturalEarth1().fitSize([flatW-20,flatH-20],{type:'Sphere'}).translate([flatW/2,flatH/2]);
      flatPath = d3.geoPath(flatProjection);
      flatG.selectAll('*').remove();
      drawFlatMap();
    }
  }
}

let lastResponsiveMobile = null;
function syncResponsiveLayout(force=false){
  const mobileNow = isMobileLayout();
  if(force || lastResponsiveMobile === null || mobileNow !== lastResponsiveMobile){
    lastResponsiveMobile = mobileNow;
    renderTopbar();
    renderLeftRail();
    renderLower();
    renderRight();
  }
  refreshMapViewport(force && !isFlat);
  updatePageWheelDock();
}

let pageWheelLifecycleBound = false;

function getDocumentScroller(){
  return document.scrollingElement || document.documentElement;
}

function updatePageWheelDock(){
  const dock = document.getElementById('pageWheelDock');
  const meta = document.getElementById('pageWheelMeta');
  const thumb = document.getElementById('pageWheelThumb');
  if(!dock || !meta || !thumb) return;
  const scroller = getDocumentScroller();
  const maxX = Math.max(0, scroller.scrollWidth - window.innerWidth);
  const maxY = Math.max(0, scroller.scrollHeight - window.innerHeight);
  const x = window.scrollX || scroller.scrollLeft || 0;
  const y = window.scrollY || scroller.scrollTop || 0;
  const widthPct = maxX > 0 ? Math.max(12, (window.innerWidth / Math.max(window.innerWidth, scroller.scrollWidth)) * 100) : 100;
  const xPct = maxX > 0 ? (x / Math.max(1, maxX)) * (100 - widthPct) : 0;
  thumb.style.width = `${widthPct}%`;
  thumb.style.transform = `translateX(${xPct}%)`;
  dock.classList.toggle('wide', maxX > 8);
  if (maxX > 8) {
    meta.textContent = `页面导航 · 横向 ${Math.round((x / Math.max(1, maxX)) * 100)}% · 滚轮平移`;
  } else {
    meta.textContent = `页面导航 · 纵向 ${Math.round((y / Math.max(1, maxY || 1)) * 100)}%`;
  }
}

function handlePageWheel(event){
  const scroller = getDocumentScroller();
  const maxX = Math.max(0, scroller.scrollWidth - window.innerWidth);
  if(maxX <= 8) return;
  event.preventDefault();
  const delta = Math.abs(event.deltaX) > Math.abs(event.deltaY) ? event.deltaX : event.deltaY;
  window.scrollBy({ left: delta * (event.shiftKey ? 2.2 : 1.25), top: 0, behavior: 'auto' });
  updatePageWheelDock();
}

function handlePageWheelClick(event){
  const track = event.currentTarget.querySelector('.page-wheel-track');
  if(!track) return;
  const scroller = getDocumentScroller();
  const maxX = Math.max(0, scroller.scrollWidth - window.innerWidth);
  if(maxX <= 8) return;
  const rect = track.getBoundingClientRect();
  const ratio = clampNumber((event.clientX - rect.left) / Math.max(1, rect.width), 0, 1);
  window.scrollTo({ left: maxX * ratio, top: window.scrollY, behavior: 'smooth' });
}

function bindPageWheelLifecycle(){
  if(pageWheelLifecycleBound) return;
  pageWheelLifecycleBound = true;
  window.addEventListener('scroll', updatePageWheelDock, { passive: true });
  window.addEventListener('resize', updatePageWheelDock, { passive: true });
}

// === REINIT (for live updates without boot sequence) ===
function reinit(){
  const scrollState = Array.from(document.querySelectorAll('[data-scroll-key]')).map(node => ({ key: node.dataset.scrollKey, top: node.scrollTop }));
  const pageScroll = { x: window.scrollX, y: window.scrollY };
  renderTopbar();renderLeftRail();renderLower();renderRight();
  for (const state of scrollState) {
    const node = document.querySelector(`[data-scroll-key="${state.key}"]`);
    if (node) node.scrollTop = state.top;
  }
  window.scrollTo(pageScroll.x, pageScroll.y);
  refreshPreciseClockNodes();
  refreshDynamicTimeNodes();
  updatePageWheelDock();
  plotMarkers();
}

let pendingLiveData = null;
let pendingLiveFrame = 0;
let livePollTimer = null;
let liveReconnectTimer = null;
let sseConnection = null;
const LIVE_TRANSPORT = { lastMessageMs: 0 };

function queueLiveUpdate(nextData){
  const nextTimestamp = nextData?.meta?.timestamp || nextData?.timestamp || null;
  const currentTimestamp = D?.meta?.timestamp || D?.timestamp || null;
  const nextMs = parseTimestampMs(nextTimestamp);
  const currentMs = parseTimestampMs(currentTimestamp);
  if(nextMs && currentMs && nextMs <= currentMs) return;
  const pendingMs = parseTimestampMs(pendingLiveData?.meta?.timestamp || pendingLiveData?.timestamp || null);
  if(nextMs && pendingMs && nextMs <= pendingMs) return;
  LIVE_TRANSPORT.lastMessageMs = Date.now();
  pendingLiveData = nextData;
  if(pendingLiveFrame) return;
  pendingLiveFrame = window.requestAnimationFrame(() => {
    pendingLiveFrame = 0;
    if(!pendingLiveData) return;
    D = applyClientSideFallbacks(pendingLiveData);
    pendingLiveData = null;
    reinit();
  });
}

async function fetchLatestDashboardData(){
  if (location.protocol === 'file:') return;
  try {
    const res = await fetch('/api/data', { cache: 'no-store' });
    if (!res.ok) return;
    const data = await res.json();
    queueLiveUpdate(data);
  } catch {}
}

function ensureLivePolling(){
  if (livePollTimer || location.protocol === 'file:') return;
  livePollTimer = window.setInterval(() => {
    if (document.hidden) return;
    if (Date.now() - (LIVE_TRANSPORT.lastMessageMs || 0) < 15000) return;
    fetchLatestDashboardData();
  }, 15000);
}

// === SSE: Live Updates from Server ===
function connectSSE(){
  if (typeof EventSource === 'undefined') return;
  // Only connect if served from localhost (not file://)
  if (location.protocol === 'file:') return;

  if (sseConnection) sseConnection.close();
  const es = new EventSource('/events');
  sseConnection = es;
  es.onopen = () => {
    LIVE_TRANSPORT.lastMessageMs = Date.now();
    if (liveReconnectTimer) {
      clearTimeout(liveReconnectTimer);
      liveReconnectTimer = null;
    }
  };
  es.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'update' && msg.data) {
        queueLiveUpdate(msg.data);
      } else if (msg.type === 'connected') {
        LIVE_TRANSPORT.lastMessageMs = Date.now();
      } else if (msg.type === 'sweep_start') {
        LIVE_TRANSPORT.lastMessageMs = Date.now();
        const badge = document.querySelector('.alert-badge');
        if (badge) { badge.textContent = '扫描中...'; badge.style.borderColor = 'var(--accent)'; }
      }
    } catch {}
  };
  es.onerror = () => {
    // Reconnect after 5s on error
    es.close();
    if (sseConnection === es) sseConnection = null;
    if (!liveReconnectTimer) {
      liveReconnectTimer = window.setTimeout(() => {
        liveReconnectTimer = null;
        fetchLatestDashboardData();
        connectSSE();
      }, 5000);
    }
  };
}

// === INIT ===
let booted = false;
function init(){
  D = applyClientSideFallbacks(D);
  renderTopbar();renderLeftRail();renderLower();renderRight();
  renderGlossary();
  ensureDynamicClockTimer();
  refreshPreciseClockNodes();
  refreshDynamicTimeNodes();
  initMap();
  bindPageWheelLifecycle();
  if (!booted) { runBoot(); booted = true; }
  // Close popup on click outside markers
  document.getElementById('mapContainer').addEventListener('click',e=>{
    if(!e.target.closest('.map-popup')) closePopup();
  });
  document.addEventListener('keydown',e=>{
    if(e.key === 'Escape') closeGlossary();
  });
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
      refreshPreciseClockNodes();
      refreshDynamicTimeNodes();
      fetchLatestDashboardData();
      updatePageWheelDock();
    }
  });
  syncResponsiveLayout(true);
}

document.addEventListener('DOMContentLoaded', () => {
  const hasInlineData = !!(D && D.meta);
  const canProbeApi = location.protocol !== 'file:';

  if (canProbeApi) {
    // Server mode: always fetch live data from API and connect SSE, even if stale inline D exists.
    fetch('/api/data')
      .then(r => r.json())
      .then(data => { D = applyClientSideFallbacks(data); init(); connectSSE(); ensureLivePolling(); })
      .catch(() => {
        if (D && D.meta) { D = applyClientSideFallbacks(D); init(); connectSSE(); ensureLivePolling(); }
      });
  } else if (hasInlineData) {
    // File mode: use inline data
    D = applyClientSideFallbacks(D);
    init();
  }
});
